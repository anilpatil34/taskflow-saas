# Render deployment configuration
services:
  - type: web
    name: taskflow-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: DB_NAME
        fromDatabase:
          name: taskflow-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: taskflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: taskflow-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: taskflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: taskflow-db
          property: port
      - key: REDIS_URL
        fromService:
          name: taskflow-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-app.vercel.app"
      - key: FRONTEND_URL
        value: "https://your-app.vercel.app"

databases:
  - name: taskflow-db
    databaseName: taskflow_db
    user: taskflow_user
    plan: free
